name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@16.78.33.180 << 'EOF'
          cd /var/www/mywebsite/tugas4_cicd || exit 1
          sudo git fetch origin main
          sudo git reset --hard origin/main
          sudo systemctl restart nginx
          EOF